# Cấu hình Railway deploy
# Xem: https://docs.railway.app/reference/config-as-code

[build]
builder = "nixpacks"

[deploy]
startCommand = "python -u facebook-bot/main.py"
# Worker không cần port — bot chạy ngầm qua WebSocket
healthcheckPath = ""
restartPolicyType = "always"
restartPolicyMaxRetries = 10
